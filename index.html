<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA V50 - ADMIN PANEL</title>
    <style>
        body { 
            background: #0b0e14; 
            color: #00d2ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding-top: 50px; 
            margin: 0;
        }
        .box { 
            background: #151921; 
            padding: 40px; 
            border-radius: 20px; 
            border: 2px solid #00d2ff; 
            display: inline-block;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        h2 { text-shadow: 0 0 10px #00d2ff; margin-bottom: 30px; }
        input { 
            background: #1b212c; 
            border: 1px solid #333; 
            color: white; 
            padding: 12px; 
            margin: 10px; 
            width: 280px; 
            border-radius: 8px; 
            outline: none;
        }
        input:focus { border-color: #00d2ff; }
        button { 
            background: #00d2ff; 
            color: #000; 
            border: none; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 8px; 
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background: #008fb3; transform: scale(1.05); }
        #msg { margin-top: 20px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="box">
        <h2>AURORA V50 ADMIN</h2>
        <input type="password" id="token" placeholder="Dán GitHub Token (ghp_...) vào đây"><br>
        <input type="text" id="keyName" placeholder="Tên Key muốn tạo (Ví dụ: LOI_VIP)"><br>
        <button onclick="create()">KÍCH HOẠT NGAY</button>
        <p id="msg"></p>
    </div>

    <script>
        async function create() {
            const token = document.getElementById('token').value.trim();
            const keyName = document.getElementById('keyName').value.trim();
            const msg = document.getElementById('msg');
            
            // CẤU HÌNH ĐÃ KHỚP VỚI REPO THANHLOICODE CỦA LỢI
            const repo = "Tloilos/thanhloicode"; //
            const filePath = "key.json"; //

            if(!token || !keyName) return alert("Admin Lợi ơi, hãy nhập đủ Token và tên Key nhé!");
            
            msg.style.color = "#f1c40f";
            msg.innerText = "⏳ Đang kết nối GitHub...";

            try {
                // 1. Lấy dữ liệu file hiện tại để có mã SHA (bắt buộc để ghi file)
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
                    headers: { 
                        'Authorization': `token ${token}`,
                        'Cache-Control': 'no-cache'
                    }
                });

                if (response.status === 401) throw new Error("TOKEN SAI HOẶC ĐÃ BỊ HỦY! Hãy tạo lại cái mới.");
                if (response.status === 404) throw new Error("KHÔNG TÌM THẤY FILE! Kiểm tra lại tên Repo.");
                if (!response.ok) throw new Error("Lỗi API: " + response.status);

                const data = await response.json();
                
                // Giải mã nội dung file JSON hiện tại
                let content = {};
                try {
                    content = JSON.parse(atob(data.content.replace(/\s/g, '')));
                } catch(e) {
                    content = {}; // Nếu file lỗi định dạng thì tạo mới
                }

                // 2. Thêm Key mới vào danh sách
                content[keyName] = { 
                    "rank": "VIP", 
                    "status": "Active",
                    "created_at": new Date().toLocaleString('vi-VN')
                };

                // 3. Gửi yêu cầu cập nhật lại file lên GitHub
                const updateResponse = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
                    method: "PUT",
                    headers: { 
                        'Authorization': `token ${token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        message: "Admin Loi added Key: " + keyName,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                        sha: data.sha
                    })
                });

                if(updateResponse.ok) {
                    msg.style.color = "#2ecc71";
                    msg.innerHTML = "✅ THÀNH CÔNG!<br>Đã thêm Key: " + keyName;
                    document.getElementById('keyName').value = ""; // Xóa ô nhập sau khi thành công
                } else {
                    const errData = await updateResponse.json();
                    throw new Error("GITHUB TỪ CHỐI GHI: " + (errData.message || "Lỗi quyền Token"));
                }

            } catch(error) {
                msg.style.color = "#e74c3c";
                msg.innerText = "❌ " + error.message;
            }
        }
    </script>
</body>
</html>
