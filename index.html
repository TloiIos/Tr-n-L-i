<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Aurora Word</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b0b0b;
    font-family:Segoe UI;
    overflow:hidden;
    color:white;
}

/* =========================
TOPBAR
========================= */
.topbar{
    height:65px;
    background:#111;
    display:flex;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid #1f1f1f;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00ffaa;
    margin-right:40px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 5px #00ffaa;
    }
    to{
        text-shadow:
        0 0 10px #00ffaa,
        0 0 20px #00ffaa;
    }
}

.toolbar{
    display:flex;
    gap:10px;
}

.btn{
    background:#1a1a1a;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.btn:hover{
    background:#00ffaa;
    color:black;
    transform:translateY(-2px);
    box-shadow:0 0 15px #00ffaa;
}

/* =========================
RGB LINE
========================= */
.rgb-line{
    height:3px;
    background:linear-gradient(
        90deg,
        #00ffaa,
        #00ccff,
        #ff00ff,
        #ffaa00,
        #00ffaa
    );
    background-size:400%;
    animation:rgbMove 8s linear infinite;
}

@keyframes rgbMove{
    0%{
        background-position:0%;
    }
    100%{
        background-position:400%;
    }
}

/* =========================
RIBBON
========================= */
.ribbon{
    height:55px;
    background:#151515;
    border-bottom:1px solid #222;
    display:flex;
    align-items:center;
    padding-left:20px;
    gap:30px;
}

.ribbon-item{
    color:#bbb;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.ribbon-item:hover{
    color:#00ffaa;
}

/* =========================
MAIN
========================= */
.main{
    display:flex;
    height:calc(100vh - 123px);
}

/* =========================
SIDEBAR
========================= */
.sidebar{
    width:75px;
    background:#121212;
    border-right:1px solid #1f1f1f;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    gap:15px;
}

.side-btn{
    width:55px;
    height:55px;
    background:#1a1a1a;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.3s;
    font-size:22px;
}

.side-btn:hover{
    background:#00ffaa;
    color:black;
    transform:scale(1.08);
    box-shadow:0 0 15px #00ffaa;
}

/* =========================
EDITOR AREA
========================= */
.editor-wrap{
    flex:1;
    padding:20px;
    overflow:auto;
}

/* =========================
TOOLBAR 2
========================= */
.editor-tools{
    height:50px;
    background:#161616;
    border-radius:15px 15px 0 0;
    display:flex;
    align-items:center;
    padding:0 20px;
    gap:20px;
    border-bottom:2px solid #00ffaa;
}

.tool{
    color:#ccc;
    font-weight:bold;
}

/* =========================
EDITOR
========================= */
.editor{
    width:100%;
    height:calc(100vh - 240px);
    background:#171717;
    border:none;
    outline:none;
    resize:none;
    color:white;
    padding:35px;
    font-size:18px;
    line-height:1.8;
    border-radius:0 0 15px 15px;
    font-family:Consolas;
    box-shadow:
    0 0 20px rgba(0,255,170,0.08);
}

.editor:focus{
    box-shadow:
    0 0 20px rgba(0,255,170,0.18);
}

/* =========================
STATUSBAR
========================= */
.statusbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:32px;
    background:#111;
    border-top:1px solid #222;
    display:flex;
    align-items:center;
    padding-left:15px;
    color:#888;
    font-size:14px;
}

/* =========================
SCROLLBAR
========================= */
::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-track{
    background:#111;
}

::-webkit-scrollbar-thumb{
    background:#00ffaa;
    border-radius:20px;
}
</style>
</head>

<body>

<!-- =========================
TOPBAR
========================= -->
<div class="topbar">

    <div class="logo">
        AURORA WORD
    </div>

    <div class="toolbar">
        <button class="btn">📂 Open</button>
        <button class="btn">💾 Save</button>
        <button class="btn">🗑 Clear</button>
    </div>

</div>

<!-- RGB LINE -->
<div class="rgb-line"></div>

<!-- =========================
RIBBON
========================= -->
<div class="ribbon">
    <div class="ribbon-item">FILE</div>
    <div class="ribbon-item">HOME</div>
    <div class="ribbon-item">INSERT</div>
    <div class="ribbon-item">VIEW</div>
    <div class="ribbon-item">TOOLS</div>
</div>

<!-- =========================
MAIN
========================= -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="side-btn">🏠</div>
        <div class="side-btn">📝</div>
        <div class="side-btn">📁</div>
        <div class="side-btn">⚙</div>
        <div class="side-btn">🌙</div>

    </div>

    <!-- EDITOR -->
    <div class="editor-wrap">

        <div class="editor-tools">
            <div class="tool">Font</div>
            <div class="tool">Size</div>
            <div class="tool">Bold</div>
            <div class="tool">Italic</div>
            <div class="tool">Underline</div>
        </div>

        <textarea class="editor">
✨ Welcome to Aurora Word...

Bạn có thể gõ văn bản ngay cả khi chưa mở file.
Dark mode + animation + giao diện modern.
        </textarea>

    </div>

</div>

<!-- STATUSBAR -->
<div class="statusbar">
    Ready...
</div>

</body>
</html>
