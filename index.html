<!--
AURORA V60 PREMIUM ADMIN PANEL
FULL UI + TOKEN + EMAIL + USERS + SETTINGS
-->

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURORA V60 PREMIUM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --bg:#060816;
    --panel:rgba(13,18,32,.84);
    --panel2:rgba(20,28,46,.7);
    --line:rgba(255,255,255,.06);
    --neon:#00ffd5;
    --cyan:#00c3ff;
    --green:#00ff88;
    --red:#ff4567;
    --orange:#ffb84d;
    --text:#e4ffff;
    --sub:#7f97ba;
}

body{
    background:
    radial-gradient(circle at top left,#0e2341 0%,transparent 35%),
    radial-gradient(circle at bottom right,#0f1e36 0%,transparent 35%),
    linear-gradient(135deg,#03050b,#09111d,#03050b);
    min-height:100vh;
    overflow-x:hidden;
    color:var(--text);
}

#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
}

.hidden{
    display:none !important;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 120px,
        rgba(255,255,255,.02) 121px
    );
    z-index:-1;
}

.login-screen{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.auth-box{
    width:430px;
    padding:35px;
    border-radius:30px;
    background:var(--panel);
    border:1px solid var(--line);
    backdrop-filter:blur(20px);
    box-shadow:
    0 0 50px rgba(0,255,213,.1),
    inset 0 0 20px rgba(255,255,255,.02);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:var(--neon);
    font-size:42px;
    font-weight:800;
    letter-spacing:3px;
    text-shadow:0 0 25px var(--neon);
}

.logo p{
    color:var(--sub);
    font-size:13px;
}

.input-group{
    margin-bottom:16px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#9fb7d7;
    font-size:12px;
}

input,
select{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#09111d;
    color:white;
    border:1px solid rgba(255,255,255,.05);
}

input:focus,
select:focus{
    border-color:var(--neon);
    box-shadow:0 0 20px rgba(0,255,213,.12);
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    margin-top:10px;
    font-weight:700;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-main{
    background:linear-gradient(135deg,var(--neon),var(--cyan));
    color:black;
}

.btn-green{
    background:linear-gradient(135deg,#00ff88,#00c853);
    color:black;
}

.btn-red{
    background:linear-gradient(135deg,#ff1744,#ff4567);
    color:white;
}

.btn-orange{
    background:linear-gradient(135deg,#ff9800,#ffb84d);
    color:black;
}

.status-box{
    margin-top:15px;
    padding:14px;
    border-radius:16px;
    background:#08101b;
    border:1px solid rgba(255,255,255,.04);
    color:var(--neon);
}

.wrapper{
    display:flex;
}

.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    padding:24px;
    background:rgba(8,12,22,.92);
    border-right:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
}

.side-logo{
    color:var(--neon);
    font-size:34px;
    font-weight:800;
    margin-bottom:30px;
    text-shadow:0 0 25px var(--neon);
}

.side-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    margin-bottom:12px;
    background:transparent;
    color:#8ca3c5;
    cursor:pointer;
    text-align:left;
    font-weight:600;
}

.side-btn:hover,
.side-btn.active{
    background:rgba(0,255,213,.1);
    color:var(--neon);
}

.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:25px;
}

.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:28px;
    padding:25px;
    backdrop-filter:blur(18px);
    box-shadow:
    0 0 35px rgba(0,0,0,.3),
    inset 0 0 20px rgba(255,255,255,.02);
}

.topbar{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.stat-box{
    min-width:150px;
    padding:20px;
    border-radius:22px;
    background:var(--panel2);
    border:1px solid rgba(255,255,255,.05);
    text-align:center;
}

.stat-box h2{
    color:var(--neon);
    font-size:32px;
}

.stat-box span{
    color:#8ea7cb;
    font-size:12px;
}

.grid{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:20px;
}

.panel-title{
    color:var(--neon);
    font-size:22px;
    margin-bottom:20px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.key-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
}

.key-card{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:20px;
    position:relative;
    overflow:hidden;
}

.key-card::before{
    content:'';
    position:absolute;
    width:220px;
    height:220px;
    background:radial-gradient(circle,rgba(0,255,213,.15),transparent);
    top:-100px;
    right:-100px;
}

.key-name{
    color:var(--neon);
    font-size:18px;
    font-weight:700;
    margin-bottom:10px;
    word-break:break-all;
}

.key-info{
    color:#90a7ca;
    font-size:13px;
    margin-bottom:8px;
}

.action-buttons{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:15px;
}

.small-btn{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
}

.badge{
    padding:7px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
}

.active{
    background:rgba(0,255,136,.12);
    color:var(--green);
}

.banned{
    background:rgba(255,77,109,.12);
    color:var(--red);
}

.notify{
    position:fixed;
    top:20px;
    right:-300px;
    background:rgba(12,18,32,.95);
    padding:15px 20px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.05);
    transition:.4s;
    z-index:9999;
}

.notify.show{
    right:20px;
}

.theme-picker{
    width:100%;
    height:50px;
    border:none;
    border-radius:14px;
    margin-top:12px;
    cursor:pointer;
}

@media(max-width:1000px){

    .grid{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
        width:100%;
    }

}

</style>
</head>
<body>

<div id="particles-js"></div>

<!-- LOGIN -->

<div class="login-screen" id="authPage">

<div class="auth-box">

<div class="logo">
<h1>AURORA</h1>
<p>V60 PREMIUM PANEL</p>
</div>

<div class="input-group">
<label>TÊN</label>
<input type="text" id="nameInput">
</div>

<div class="input-group">
<label>EMAIL</label>
<input type="email" id="emailInput">
</div>

<div class="input-group">
<label>MẬT KHẨU</label>
<input type="password" id="passwordInput">
</div>

<button class="btn btn-main" onclick="signUp()">
ĐĂNG KÝ
</button>

<button class="btn btn-green" onclick="login()">
ĐĂNG NHẬP
</button>

<div class="status-box" id="authStatus">
⚡ Welcome To Aurora
</div>

</div>
</div>

<!-- PANEL -->

<div class="hidden" id="mainPanel">

<div class="wrapper">

<div class="sidebar">

<div class="side-logo">
AURORA
</div>

<button class="side-btn active">
DASHBOARD
</button>

<button class="side-btn" onclick="fetchUsers()">
USERS
</button>

<button class="side-btn" onclick="exportKeys()">
EXPORT
</button>

<button class="side-btn" onclick="logout()">
LOGOUT
</button>

</div>

<div class="main">

<div class="panel topbar">

<div>
<h2 style="color:var(--neon)">
AURORA V60
</h2>

<p style="color:var(--sub)">
FULL PREMIUM SYSTEM
</p>

<div id="clock"></div>
</div>

<div class="stats">

<div class="stat-box">
<h2 id="totalKeys">0</h2>
<span>TOTAL</span>
</div>

<div class="stat-box">
<h2 id="activeKeys">0</h2>
<span>ACTIVE</span>
</div>

<div class="stat-box">
<h2 id="bannedKeys">0</h2>
<span>BANNED</span>
</div>

</div>
</div>

<div class="grid">

<!-- LEFT -->

<div>

<div class="panel">

<div class="panel-title">
CREATE KEY
</div>

<div class="input-group">
<label>KEY</label>
<input type="text" id="keyInput">
</div>

<div class="row">

<div class="input-group">

<label>DURATION</label>

<select id="durationInput">
<option value="1">1 DAY</option>
<option value="7">7 DAYS</option>
<option value="30">30 DAYS</option>
<option value="365">365 DAYS</option>
</select>

</div>

<div class="input-group">

<label>DEVICES</label>

<select id="deviceInput">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="5">5</option>
</select>

</div>

</div>

<button class="btn btn-main" onclick="createKey()">
CREATE KEY
</button>

<button class="btn btn-orange" onclick="generateRandomKey()">
RANDOM KEY
</button>

<input type="color"
class="theme-picker"
id="themePicker"
value="#00ffd5">

<div class="status-box" id="statusBox">
⚡ Server Online
</div>

</div>

<div class="panel" style="margin-top:20px;">

<div class="panel-title">
TOKEN SYSTEM
</div>

<div class="status-box"
id="tokenText">
NO TOKEN
</div>

<button class="btn btn-main"
onclick="generateToken()">

GENERATE TOKEN

</button>

<button class="btn btn-green"
onclick="copyToken()">

COPY TOKEN

</button>

<button class="btn btn-orange"
onclick="sendMail()">

SEND EMAIL

</button>

</div>

</div>

<!-- RIGHT -->

<div class="panel">

<div class="panel-title">
PREMIUM KEYS
</div>

<div class="input-group">
<input type="text"
id="searchInput"
placeholder="Search..."
onkeyup="filterKeys()">
</div>

<div class="key-grid"
id="keyGrid">

</div>

<div class="key-grid"
id="userGrid"
style="margin-top:20px;">

</div>

</div>

</div>

</div>
</div>
</div>

<script>

emailjs.init("YOUR_PUBLIC_KEY");

const BASE_URL =
"https://aurora-sever-default-rtdb.asia-southeast1.firebasedatabase.app";

particlesJS("particles-js",{
particles:{
number:{value:90},
color:{value:"#00ffd5"},
line_linked:{
enable:true,
color:"#00ffd5",
opacity:.2
},
move:{speed:2},
size:{value:3}
}
});

function notify(text){

const div =
document.createElement("div");

div.className = "notify";

div.innerText = text;

document.body.appendChild(div);

setTimeout(()=>{
div.classList.add("show");
},100);

setTimeout(()=>{
div.remove();
},3000);

}

function setStatus(msg,error=false){

const box =
document.getElementById("statusBox");

box.innerText = msg;

box.style.color =
error
? "#ff4567"
: "#00ffd5";

}

function setAuthStatus(msg,error=false){

const box =
document.getElementById("authStatus");

box.innerText = msg;

box.style.color =
error
? "#ff4567"
: "#00ffd5";

}

async function signUp(){

const name =
document.getElementById("nameInput")
.value.trim();

const email =
document.getElementById("emailInput")
.value.trim();

const password =
document.getElementById("passwordInput")
.value.trim();

if(!name || !email || !password){

return setAuthStatus(
"❌ Nhập đầy đủ!",
true
);

}

try{

await fetch(
`${BASE_URL}/users/${btoa(email)}.json`,
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
email,
password
})
}
);

setAuthStatus(
"✅ Đăng ký thành công!"
);

}
catch{

setAuthStatus(
"❌ Lỗi đăng ký!",
true
);

}

}

async function login(){

const email =
document.getElementById("emailInput")
.value.trim();

const password =
document.getElementById("passwordInput")
.value.trim();

try{

const res = await fetch(
`${BASE_URL}/users/${btoa(email)}.json`
);

const data = await res.json();

if(!data){

return setAuthStatus(
"❌ Không tồn tại!",
true
);

}

if(data.password !== password){

return setAuthStatus(
"❌ Sai mật khẩu!",
true
);

}

localStorage.setItem(
"aurora_email",
email
);

document
.getElementById("authPage")
.classList.add("hidden");

document
.getElementById("mainPanel")
.classList.remove("hidden");

fetchKeys();

notify("✅ Login Success!");

}
catch{

setAuthStatus(
"❌ Login Failed!",
true
);

}

}

function generateRandomKey(){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

let result = "AURORA-";

for(let i=0;i<24;i++){

result += chars.charAt(
Math.floor(
Math.random()*chars.length
)
);

}

document
.getElementById("keyInput")
.value = result;

}

async function createKey(){

const key =
document.getElementById("keyInput")
.value.trim();

const duration =
parseInt(
document.getElementById("durationInput")
.value
);

const devices =
parseInt(
document.getElementById("deviceInput")
.value
);

if(!key){

return alert("Nhập key!");

}

let exp = new Date();

exp.setDate(
exp.getDate()+duration
);

const body = {

[key]:{

rank:"VIP",
status:"Active",

max_devices:devices,
used_devices:0,

expired_at:
exp.toLocaleString("vi-VN"),

created_at:
new Date()
.toLocaleString("vi-VN")

}

};

try{

await fetch(
`${BASE_URL}/keys.json`,
{
method:"PATCH",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(body)
}
);

setStatus(
"✅ Created!"
);

fetchKeys();

notify("🔑 Key Created!");

}
catch{

setStatus(
"❌ Failed!",
true
);

}

}

async function fetchKeys(){

try{

const res = await fetch(
`${BASE_URL}/keys.json`
);

const data = await res.json();

renderKeys(data || {});
updateStats(data || {});

}
catch{

notify("❌ Cannot Load!");

}

}

function updateStats(data){

const values =
Object.values(data);

document
.getElementById("totalKeys")
.innerText = values.length;

document
.getElementById("activeKeys")
.innerText =
values.filter(
v=>v.status==="Active"
).length;

document
.getElementById("bannedKeys")
.innerText =
values.filter(
v=>v.status==="Banned"
).length;

}

function renderKeys(data){

const grid =
document.getElementById("keyGrid");

grid.innerHTML = "";

Object.entries(data)
.reverse()
.forEach(([key,val])=>{

grid.innerHTML += `

<div class="key-card">

<div class="key-name">
${key}
</div>

<div class="key-info">
👑 ${val.rank}
</div>

<div class="key-info">
💻 ${val.used_devices}/${val.max_devices}
</div>

<div class="key-info">
⏳ ${val.expired_at}
</div>

<div class="action-buttons">

<button
class="small-btn btn-orange"
onclick="lockKey('${key}')">

LOCK

</button>

<button
class="small-btn btn-green"
onclick="unlockKey('${key}')">

OPEN

</button>

<button
class="small-btn btn-red"
onclick="deleteKey('${key}')">

DELETE

</button>

<button
class="small-btn btn-main"
onclick="copyKey('${key}')">

COPY

</button>

</div>

</div>

`;

});

}

async function updateStatus(
key,
status
){

await fetch(
`${BASE_URL}/keys/${key}.json`,
{
method:"PATCH",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
status
})
}
);

fetchKeys();

}

function lockKey(key){

updateStatus(
key,
"Banned"
);

notify("🔒 Locked!");

}

function unlockKey(key){

updateStatus(
key,
"Active"
);

notify("🔓 Opened!");

}

async function deleteKey(key){

if(!confirm(
`Delete ${key}?`
)) return;

await fetch(
`${BASE_URL}/keys/${key}.json`,
{
method:"DELETE"
}
);

fetchKeys();

notify("🗑️ Deleted!");

}

function filterKeys(){

const value =
document.getElementById("searchInput")
.value
.toLowerCase();

const cards =
document.querySelectorAll(".key-card");

cards.forEach(card=>{

card.style.display =
card.innerText
.toLowerCase()
.includes(value)
? ""
: "none";

});

}

function copyKey(key){

navigator.clipboard
.writeText(key);

notify("📋 Copied!");

}

function logout(){

localStorage.removeItem(
"aurora_email"
);

location.reload();

}

function generateToken(){

const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let token = "AURORA_";

for(let i=0;i<64;i++){

token += chars.charAt(
Math.floor(
Math.random()*chars.length
)
);

}

document
.getElementById("tokenText")
.innerText = token;

localStorage.setItem(
"aurora_token",
token
);

notify("🔐 Token Generated!");

}

function copyToken(){

const token =
document
.getElementById("tokenText")
.innerText;

navigator.clipboard
.writeText(token);

notify("📋 Token Copied!");

}

async function sendMail(){

const email =
prompt("Enter Email");

if(!email) return;

const token =
document
.getElementById("tokenText")
.innerText;

try{

await emailjs.send(

"YOUR_SERVICE_ID",

"YOUR_TEMPLATE_ID",

{
name:email,
key:token,
status:"ACTIVE"
}

);

notify("📧 Sent!");

}
catch(err){

console.log(err);

notify("❌ Failed!");

}

}

async function fetchUsers(){

const res = await fetch(
`${BASE_URL}/users.json`
);

const data = await res.json();

renderUsers(data || {});

}

function renderUsers(data){

const grid =
document.getElementById("userGrid");

grid.innerHTML = "";

Object.values(data)
.forEach(user=>{

grid.innerHTML += `

<div class="key-card">

<div class="key-name">
${user.name}
</div>

<div class="key-info">
📧 ${user.email}
</div>

</div>

`;

});

}

async function exportKeys(){

const res = await fetch(
`${BASE_URL}/keys.json`
);

const data = await res.json();

const blob = new Blob(
[
JSON.stringify(
data,
null,
2
)
],
{
type:"application/json"
}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"aurora_keys.json";

a.click();

notify("📦 Exported!");

}

const picker =
document.getElementById("themePicker");

picker.addEventListener("input",e=>{

const color = e.target.value;

document.documentElement
.style
.setProperty("--neon",color);

localStorage.setItem(
"aurora_theme",
color
);

});

const savedTheme =
localStorage.getItem(
"aurora_theme"
);

if(savedTheme){

document.documentElement
.style
.setProperty(
"--neon",
savedTheme
);

picker.value = savedTheme;

}

setInterval(()=>{

document
.getElementById("clock")
.innerText =
new Date()
.toLocaleString("vi-VN");

},1000);

setInterval(
fetchKeys,
5000
);

</script>

</body>
</html>
