<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURORA V50 PREMIUM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --bg:#050816;
    --panel:rgba(12,18,32,.82);
    --panel2:rgba(18,25,42,.7);
    --line:rgba(255,255,255,.06);
    --neon:#00ffd5;
    --cyan:#00bfff;
    --red:#ff4567;
    --green:#00ff88;
    --orange:#ffb84d;
    --text:#dffcff;
    --sub:#7f97ba;
}

body{
    background:
    radial-gradient(circle at top left,#0f2a46 0%,transparent 30%),
    radial-gradient(circle at bottom right,#10223d 0%,transparent 30%),
    linear-gradient(135deg,#03050b,#09111e,#03050b);
    min-height:100vh;
    color:var(--text);
    overflow-x:hidden;
}

#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 98px,
        rgba(255,255,255,.02) 100px
    );
    z-index:-1;
}

.hidden{
    display:none !important;
}

/* LOGIN */

.login-screen{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.auth-box{
    width:430px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:28px;
    padding:35px;
    backdrop-filter:blur(18px);
    box-shadow:
    0 0 50px rgba(0,255,213,.12),
    inset 0 0 30px rgba(255,255,255,.02);
    animation:fadeUp .7s ease;
    position:relative;
    overflow:hidden;
}

.auth-box::before{
    content:'';
    position:absolute;
    width:250px;
    height:250px;
    background:radial-gradient(circle,rgba(0,255,213,.16),transparent);
    top:-100px;
    right:-100px;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:42px;
    color:var(--neon);
    font-weight:800;
    text-shadow:0 0 25px var(--neon);
    letter-spacing:3px;
}

.logo p{
    color:var(--sub);
    margin-top:5px;
    font-size:13px;
}

.input-group{
    margin-bottom:16px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#9fb7d7;
    font-size:12px;
}

input,
select{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#09111d;
    color:white;
    border:1px solid rgba(255,255,255,.05);
    transition:.25s;
}

input:focus,
select:focus{
    border-color:var(--neon);
    box-shadow:0 0 20px rgba(0,255,213,.12);
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    margin-top:10px;
    font-weight:700;
    letter-spacing:1px;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-main{
    background:linear-gradient(135deg,var(--neon),var(--cyan));
    color:black;
}

.btn-green{
    background:linear-gradient(135deg,#00ff88,#00c853);
    color:black;
}

.btn-red{
    background:linear-gradient(135deg,#ff1744,#ff4d6d);
    color:white;
}

.btn-orange{
    background:linear-gradient(135deg,#ff9800,#ffb347);
    color:black;
}

.status-box{
    margin-top:15px;
    padding:14px;
    border-radius:16px;
    background:#08101b;
    border:1px solid rgba(255,255,255,.04);
    color:var(--neon);
    min-height:52px;
}

/* PANEL */

.wrapper{
    display:flex;
}

.sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:rgba(8,12,22,.92);
    border-right:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    padding:24px;
}

.side-logo{
    font-size:34px;
    color:var(--neon);
    font-weight:800;
    text-shadow:0 0 25px var(--neon);
    margin-bottom:30px;
}

.side-btn{
    width:100%;
    padding:15px;
    margin-bottom:12px;
    border:none;
    border-radius:16px;
    background:transparent;
    color:#8ca3c5;
    text-align:left;
    cursor:pointer;
    transition:.25s;
    font-weight:600;
}

.side-btn:hover,
.side-btn.active{
    background:rgba(0,255,213,.1);
    color:var(--neon);
}

.main{
    margin-left:260px;
    width:calc(100% - 260px);
    padding:25px;
}

.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:28px;
    padding:25px;
    backdrop-filter:blur(18px);
    box-shadow:
    0 0 35px rgba(0,0,0,.3),
    inset 0 0 20px rgba(255,255,255,.02);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.top-left h2{
    font-size:30px;
    color:var(--neon);
}

.top-left p{
    color:var(--sub);
    font-size:13px;
}

.live-clock{
    color:#8eb0d8;
    font-size:13px;
    margin-top:5px;
}

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.stat-box{
    min-width:150px;
    padding:20px;
    border-radius:20px;
    background:var(--panel2);
    border:1px solid rgba(255,255,255,.05);
    text-align:center;
}

.stat-box h2{
    color:var(--neon);
    font-size:32px;
}

.stat-box span{
    color:#8ea7cb;
    font-size:12px;
}

.grid{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:20px;
}

.panel-title{
    font-size:22px;
    color:var(--neon);
    margin-bottom:20px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.key-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:18px;
}

.key-card{
    position:relative;
    overflow:hidden;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:24px;
    padding:20px;
    transition:.25s;
}

.key-card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 35px rgba(0,255,213,.14);
}

.key-card::before{
    content:'';
    position:absolute;
    width:220px;
    height:220px;
    background:radial-gradient(circle,rgba(0,255,213,.15),transparent);
    top:-100px;
    right:-100px;
}

.key-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.key-name{
    color:var(--neon);
    font-size:18px;
    font-weight:700;
    word-break:break-all;
}

.key-info{
    color:#90a7ca;
    font-size:13px;
    margin-bottom:8px;
}

.badge{
    padding:7px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
}

.active{
    background:rgba(0,255,136,.12);
    color:var(--green);
}

.banned{
    background:rgba(255,77,109,.12);
    color:var(--red);
}

.action-buttons{
    display:flex;
    gap:8px;
    margin-top:15px;
    flex-wrap:wrap;
}

.small-btn{
    border:none;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
}

.theme-picker{
    width:100%;
    height:50px;
    border:none;
    border-radius:14px;
    margin-top:10px;
    cursor:pointer;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#6f86aa;
    font-size:12px;
}

@media(max-width:1200px){

    .grid{
        grid-template-columns:1fr;
    }

}

@media(max-width:900px){

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
        width:100%;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>
</head>
<body>

<div id="particles-js"></div>

<!-- LOGIN -->

<div class="login-screen" id="authPage">

    <div class="auth-box">

        <div class="logo">
            <h1>AURORA</h1>
            <p>PREMIUM ADMIN PANEL</p>
        </div>

        <div class="input-group">
            <label>TÊN</label>
            <input type="text" id="nameInput" placeholder="Nhập tên">
        </div>

        <div class="input-group">
            <label>EMAIL</label>
            <input type="email" id="emailInput" placeholder="Nhập email">
        </div>

        <div class="input-group">
            <label>MẬT KHẨU</label>
            <input type="password" id="passwordInput" placeholder="Nhập mật khẩu">
        </div>

        <button class="btn btn-main" onclick="signUp()">
            ĐĂNG KÝ
        </button>

        <button class="btn btn-green" onclick="login()">
            ĐĂNG NHẬP
        </button>

        <div class="status-box" id="authStatus">
            ⚡ Welcome To Aurora Premium
        </div>

    </div>

</div>

<!-- PANEL -->

<div class="hidden" id="mainPanel">

<div class="wrapper">

<div class="sidebar">

    <div class="side-logo">
        AURORA
    </div>

    <button class="side-btn active">
        DASHBOARD
    </button>

    <button class="side-btn">
        KEYS
    </button>

    <button class="side-btn">
        USERS
    </button>

    <button class="side-btn">
        ANALYTICS
    </button>

    <button class="side-btn">
        SETTINGS
    </button>

</div>

<div class="main">

<div class="panel topbar">

    <div class="top-left">
        <h2>AURORA V50</h2>
        <p>FULL PREMIUM ADMIN PANEL</p>

        <div class="live-clock" id="clock">
            Loading...
        </div>
    </div>

    <div class="stats">

        <div class="stat-box">
            <h2 id="totalKeys">0</h2>
            <span>TOTAL KEYS</span>
        </div>

        <div class="stat-box">
            <h2 id="activeKeys">0</h2>
            <span>ACTIVE</span>
        </div>

        <div class="stat-box">
            <h2 id="bannedKeys">0</h2>
            <span>BANNED</span>
        </div>

    </div>

</div>

<div class="grid">

<div class="panel">

    <div class="panel-title">
        CREATE VIP KEY
    </div>

    <div class="input-group">
        <label>KEY NAME</label>
        <input type="text" id="keyInput" placeholder="AURORA-VIP">
    </div>

    <div class="row">

        <div class="input-group">
            <label>DURATION</label>

            <select id="durationInput">
                <option value="1">1 DAY</option>
                <option value="7">7 DAYS</option>
                <option value="30" selected>30 DAYS</option>
                <option value="365">365 DAYS</option>
                <option value="9999">LIFETIME</option>
            </select>

        </div>

        <div class="input-group">

            <label>DEVICES</label>

            <select id="deviceInput">
                <option value="1">1 DEVICE</option>
                <option value="2">2 DEVICES</option>
                <option value="3">3 DEVICES</option>
                <option value="5">5 DEVICES</option>
            </select>

        </div>

    </div>

    <button class="btn btn-main" onclick="createKey()">
        CREATE KEY
    </button>

    <button class="btn btn-orange" onclick="generateRandomKey()">
        RANDOM PREMIUM KEY
    </button>

    <input type="color"
    class="theme-picker"
    id="themePicker"
    value="#00ffd5">

    <div class="status-box" id="statusBox">
        ⚡ Server Online...
    </div>

</div>

<div class="panel">

    <div class="panel-title">
        PREMIUM KEYS
    </div>

    <div class="input-group">
        <input type="text"
        id="searchInput"
        placeholder="Search key..."
        onkeyup="filterKeys()">
    </div>

    <div class="key-grid" id="keyGrid"></div>

</div>

</div>

<div class="footer">
    AURORA V50 © PREMIUM ADMIN SYSTEM
</div>

</div>
</div>
</div>

<script>

const BASE_URL =
"https://aurora-sever-default-rtdb.asia-southeast1.firebasedatabase.app";

particlesJS("particles-js",{
    particles:{
        number:{value:90},
        color:{value:"#00ffd5"},
        line_linked:{
            enable:true,
            color:"#00ffd5",
            opacity:.2
        },
        move:{speed:2},
        size:{value:3}
    }
});

function setAuthStatus(msg,error=false){

    const box = document.getElementById("authStatus");

    box.innerText = msg;

    box.style.color =
    error
    ? "#ff4567"
    : "#00ffd5";
}

function setStatus(msg,error=false){

    const box = document.getElementById("statusBox");

    box.innerText = msg;

    box.style.color =
    error
    ? "#ff4567"
    : "#00ffd5";
}

async function signUp(){

    const name =
    document.getElementById("nameInput")
    .value.trim();

    const email =
    document.getElementById("emailInput")
    .value.trim();

    const password =
    document.getElementById("passwordInput")
    .value.trim();

    if(!name || !email || !password){
        return setAuthStatus(
            "❌ Nhập đầy đủ thông tin!",
            true
        );
    }

    try{

        await fetch(
            `${BASE_URL}/users/${btoa(email)}.json`,
            {
                method:"PUT",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    name,
                    email,
                    password
                })
            }
        );

        setAuthStatus("✅ Đăng ký thành công!");

    }
    catch{

        setAuthStatus("❌ Lỗi đăng ký!",true);

    }

}

async function login(){

    const email =
    document.getElementById("emailInput")
    .value.trim();

    const password =
    document.getElementById("passwordInput")
    .value.trim();

    try{

        const res = await fetch(
            `${BASE_URL}/users/${btoa(email)}.json`
        );

        const data = await res.json();

        if(!data){

            return setAuthStatus(
                "❌ Tài khoản không tồn tại!",
                true
            );

        }

        if(data.password !== password){

            return setAuthStatus(
                "❌ Sai mật khẩu!",
                true
            );

        }

        localStorage.setItem(
            "aurora_email",
            email
        );

        document
        .getElementById("authPage")
        .classList.add("hidden");

        document
        .getElementById("mainPanel")
        .classList.remove("hidden");

        fetchKeys();

    }
    catch{

        setAuthStatus(
            "❌ Không thể đăng nhập!",
            true
        );

    }

}

function generateRandomKey(){

    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let result = "AURORA-";

    for(let i=0;i<24;i++){

        result += chars.charAt(
            Math.floor(
                Math.random()*chars.length
            )
        );

    }

    document
    .getElementById("keyInput")
    .value = result;

}

async function createKey(){

    const key =
    document.getElementById("keyInput")
    .value.trim();

    const duration =
    parseInt(
        document.getElementById("durationInput")
        .value
    );

    const devices =
    parseInt(
        document.getElementById("deviceInput")
        .value
    );

    if(!key){
        return alert("Nhập key!");
    }

    let exp = new Date();

    exp.setDate(
        exp.getDate()+duration
    );

    const body = {

        [key]:{

            rank:"VIP",
            status:"Active",

            max_devices:devices,
            used_devices:0,

            expired_at:
            exp.toLocaleString("vi-VN"),

            created_at:
            new Date()
            .toLocaleString("vi-VN"),

            hwid_list:{}

        }

    };

    try{

        await fetch(
            `${BASE_URL}/keys.json`,
            {
                method:"PATCH",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(body)
            }
        );

        setStatus(
            "✅ Key created successfully!"
        );

        fetchKeys();

    }
    catch{

        setStatus(
            "❌ Cannot create key!",
            true
        );

    }

}

async function fetchKeys(){

    try{

        const res = await fetch(
            `${BASE_URL}/keys.json`
        );

        const data = await res.json();

        renderKeys(data || {});
        updateStats(data || {});

    }
    catch{

        setStatus(
            "❌ Cannot load data!",
            true
        );

    }

}

function updateStats(data){

    const values =
    Object.values(data);

    document
    .getElementById("totalKeys")
    .innerText = values.length;

    document
    .getElementById("activeKeys")
    .innerText =
    values.filter(
        v=>v.status==="Active"
    ).length;

    document
    .getElementById("bannedKeys")
    .innerText =
    values.filter(
        v=>v.status==="Banned"
    ).length;

}

function renderKeys(data){

    const grid =
    document.getElementById("keyGrid");

    grid.innerHTML = "";

    Object.entries(data)
    .reverse()
    .forEach(([key,val])=>{

        grid.innerHTML += `

        <div class="key-card">

            <div class="key-top">

                <div class="key-name">
                    ${key}
                </div>

                <span class="badge ${
                    val.status==="Active"
                    ? "active"
                    : "banned"
                }">
                    ${val.status}
                </span>

            </div>

            <div class="key-info">
                👑 Rank: ${val.rank}
            </div>

            <div class="key-info">
                💻 Devices:
                ${val.used_devices}/
                ${val.max_devices}
            </div>

            <div class="key-info">
                ⏳ Expired:
                ${val.expired_at}
            </div>

            <div class="key-info">
                📅 Created:
                ${val.created_at || "N/A"}
            </div>

            <div class="action-buttons">

                <button
                class="small-btn btn-orange"
                onclick="lockKey('${key}')">
                    LOCK
                </button>

                <button
                class="small-btn btn-green"
                onclick="unlockKey('${key}')">
                    OPEN
                </button>

                <button
                class="small-btn btn-red"
                onclick="deleteKey('${key}')">
                    DELETE
                </button>

            </div>

        </div>

        `;

    });

}

async function updateStatus(key,status){

    try{

        await fetch(
            `${BASE_URL}/keys/${key}.json`,
            {
                method:"PATCH",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    status
                })
            }
        );

        setStatus(
            `✅ Updated ${key}`
        );

        fetchKeys();

    }
    catch{

        setStatus(
            "❌ Error update!",
            true
        );

    }

}

function lockKey(key){

    updateStatus(
        key,
        "Banned"
    );

}

function unlockKey(key){

    updateStatus(
        key,
        "Active"
    );

}

async function deleteKey(key){

    if(!confirm(
        `Delete ${key}?`
    )) return;

    try{

        await fetch(
            `${BASE_URL}/keys/${key}.json`,
            {
                method:"DELETE"
            }
        );

        setStatus(
            "🗑️ Deleted!"
        );

        fetchKeys();

    }
    catch{

        setStatus(
            "❌ Delete failed!",
            true
        );

    }

}

function filterKeys(){

    const value =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    const cards =
    document.querySelectorAll(".key-card");

    cards.forEach(card=>{

        card.style.display =
        card.innerText
        .toLowerCase()
        .includes(value)
        ? ""
        : "none";

    });

}

const picker =
document.getElementById("themePicker");

picker.addEventListener("input",e=>{

    const color = e.target.value;

    document.documentElement
    .style
    .setProperty("--neon",color);

    localStorage.setItem(
        "aurora_theme",
        color
    );

});

const savedTheme =
localStorage.getItem(
    "aurora_theme"
);

if(savedTheme){

    document.documentElement
    .style
    .setProperty(
        "--neon",
        savedTheme
    );

    picker.value = savedTheme;

}

setInterval(()=>{

    document
    .getElementById("clock")
    .innerText =
    new Date()
    .toLocaleString("vi-VN");

},1000);

window.onload = ()=>{

    const saved =
    localStorage.getItem(
        "aurora_email"
    );

    if(saved){

        document
        .getElementById("emailInput")
        .value = saved;

    }

};

setInterval(fetchKeys,5000);

</script>
</body>
</html>
